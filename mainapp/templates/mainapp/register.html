{% extends 'mainapp/base.html' %}
{% block content %}
<div style="max-width: 400px; margin: 40px auto; padding: 20px; border: 1px solid #ccc; border-radius: 5px; color: #333;">
    <h2>📝 Реєстрація користувача</h2>
    <form method="post">
        {% csrf_token %}
        <div style="margin-bottom: 10px;">
            <label>Логін:</label><br>
            <input type="text" name="username" required style="width: 100%; padding: 8px; margin-top: 5px;">
        </div>
        <div style="margin-bottom: 10px;">
            <label>Email:</label><br>
            <input type="email" name="email" required style="width: 100%; padding: 8px; margin-top: 5px;">
        </div>
        <div style="margin-bottom: 15px;">
            <label>Пароль:</label><br>
            <input type="password" name="password" required style="width: 100%; padding: 8px; margin-top: 5px;">
        </div>
        <button type="submit" style="width: 100%; padding: 10px; background: #2ecc71; color: white; border: none; border-radius: 3px; font-weight: bold; cursor: pointer;">Створити акаунт</button>
    </form>
    <p style="margin-top: 15px; text-align: center;">Уже є акаунт? <a href="{% url 'login' %}">Увійти</a></p>
</div>
{% endblock %}

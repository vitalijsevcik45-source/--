{% extends 'mainapp/base.html' %}
{% block content %}
<div style="max-width: 450px; margin: 40px auto; padding: 30px; border: 1px solid #e2e8f0; border-radius: 12px; background: #fff; text-align: center;">
    <h2 style="font-size: 22px; font-weight: 700; color: #10b981; margin-bottom: 15px;">🎉 Пароль успішно змінено!</h2>
    <p style="color: #475569; font-size: 15px; margin-bottom: 20px;">Ваш новий пароль активовано. Тепер ви можете увійти до свого профілю.</p>
    <a href="{% url 'login' %}" class="btn btn-primary" style="padding: 10px 20px; text-decoration: none; border-radius: 6px; font-weight: 600; display: inline-block;">Увійти</a>
</div>
{% endblock %}

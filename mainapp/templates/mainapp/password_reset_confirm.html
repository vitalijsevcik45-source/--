{% extends 'mainapp/base.html' %}
{% block content %}
<div style="max-width: 450px; margin: 40px auto; padding: 30px; border: 1px solid #e2e8f0; border-radius: 12px; background: #fff;">
    <h2 style="font-size: 22px; font-weight: 700; margin-bottom: 20px; text-align: center; color: #1e293b;">🔑 Введіть новий пароль</h2>
    
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary" style="width: 100%; padding: 12px; font-weight: 600; border-radius: 6px; margin-top: 15px;">
            Зберегти новий пароль
        </button>
    </form>
</div>
{% endblock %}

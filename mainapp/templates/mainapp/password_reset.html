{% extends 'mainapp/base.html' %}
{% block content %}
<div style="max-width: 450px; margin: 40px auto; padding: 30px; border: 1px solid #e2e8f0; border-radius: 12px; background: #fff; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);">
    <h2 style="font-size: 22px; font-weight: 700; margin-bottom: 15px; text-align: center; color: #1e293b;">🔒 Відновлення пароля</h2>
    <p style="color: #64748b; font-size: 14px; text-align: center; margin-bottom: 20px;">Введіть Email, який ви вказували при реєстрації, і ми надішлемо вам посилання для зміни пароля.</p>
    
    <form method="post">
        {% csrf_token %}
        <div style="margin-bottom: 20px;">
            <label style="font-size: 14px; font-weight: 500; color: #475569;">Ваш Email:</label>
            <input type="email" name="email" required style="width: 100%; padding: 10px; margin-top: 5px; border-radius: 6px; border: 1px solid #cbd5e1; outline: none; box-sizing: border-box;">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; padding: 12px; font-weight: 600; border-radius: 6px;">
            Надіслати посилання
        </button>
    </form>
</div>
{% endblock %}

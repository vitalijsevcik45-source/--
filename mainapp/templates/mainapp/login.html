{% extends 'mainapp/base.html' %}
{% block content %}
<div style="max-width: 400px; margin: 40px auto; padding: 30px; border: 1px solid #e2e8f0; border-radius: 12px; background: #fff; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); color: #1e293b;">
    <h2 style="font-size: 24px; font-weight: 700; margin-bottom: 20px; text-align: center;">🔐 Вхід на сайт</h2>

    <form method="post">
        {% csrf_token %}
        <div style="margin-bottom: 15px;">
            <label style="font-size: 14px; font-weight: 500; color: #475569;">Логін або Username:</label>
            <input type="text" name="username" required style="width: 100%; padding: 10px; margin-top: 5px; border-radius: 6px; border: 1px solid #cbd5e1; outline: none; font-size: 14px;">
        </div>
        <div style="margin-bottom: 20px;">
            <label style="font-size: 14px; font-weight: 500; color: #475569;">Пароль:</label>
            <input type="password" name="password" required style="width: 100%; padding: 10px; margin-top: 5px; border-radius: 6px; border: 1px solid #cbd5e1; outline: none; font-size: 14px;">
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; padding: 12px; font-size: 15px; font-weight: 600; border-radius: 6px; cursor: pointer; border: none; color: white;">
            Увійти
        </button>
    </form>

    <div style="margin-top: 15px; text-align: right;">
        <a href="{% url 'password_reset' %}" style="color: #64748b; text-decoration: none; font-size: 14px;">Забули пароль?</a>
    </div>

    <hr style="border: 0; border-top: 1px solid #f1f5f9; margin: 20px 0;">

    <p style="text-align: center; font-size: 14px; color: #475569;">
        Ще немає акаунту? <a href="{% url 'register' %}" style="color: #0ea5e9; text-decoration: none; font-weight: 600;">Зареєструватися</a>
    </p>
</div>

<script>
function showForgotPasswordAlert() {
    alert("🔒 Відновлення доступу:\n\nОскільки сайт працює в тестовому режимі, для скидання або відновлення паролю зверніться до головного адміністратора магазину:\n\n📞 Телефон: +380667727865\n📧 Email: admin@bookstore.ua");
}
</script>
{% endblock %}
